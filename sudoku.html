<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Sudoku App</title>
    
    <!-- Bootstrap 5 & Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

        body {
            background-color: #f4f6f8;
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .app-container {
            width: 100%;
            max-width: 420px;
            background-color: #ffffff;
            height: 100vh;
            max-height: 850px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }

        /* --- Start Screen --- */
        #startScreen {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100%;
            padding: 20px;
            background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
            z-index: 10;
        }
        .logo-container {
            margin-bottom: 40px;
            text-align: center;
        }
        .logo-icon {
            font-size: 4rem;
            color: #2563eb;
            margin-bottom: 10px;
        }
        .app-title {
            font-size: 2rem;
            font-weight: 800;
            color: #0f172a;
            letter-spacing: -1px;
        }
        .level-btn {
            width: 80%;
            padding: 16px;
            margin-bottom: 15px;
            border-radius: 12px;
            border: none;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            background-color: #ffffff;
            color: #0f172a;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .level-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 15px rgba(0,0,0,0.1);
        }
        .level-btn.easy { border-left: 5px solid #22c55e; }
        .level-btn.medium { border-left: 5px solid #eab308; }
        .level-btn.hard { border-left: 5px solid #f97316; }
        .level-btn.expert { border-left: 5px solid #ef4444; }

        /* --- Game Screen --- */
        #gameScreen {
            display: none;
            flex-direction: column;
            height: 100%;
        }

        .header-title {
            font-size: 0.7rem;
            letter-spacing: 1.5px;
            color: #8fa0b4;
            margin-bottom: 2px;
            text-transform: uppercase;
        }
        
        .timer {
            font-size: 1.2rem;
            color: #0f172a;
            font-variant-numeric: tabular-nums;
        }

        /* Sudoku Board Grid */
        .board-wrapper {
            padding: 0 15px;
            margin-top: 5px;
        }

        .sudoku-board {
            display: grid;
            grid-template-columns: repeat(9, 1fr);
            width: 100%;
            aspect-ratio: 1 / 1;
            border: 3px solid #0f172a;
            background-color: #fff;
            box-sizing: border-box;
        }

        .sudoku-cell {
            border-right: 1px solid #e2e8f0;
            border-bottom: 1px solid #e2e8f0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            font-weight: 500;
            color: #0f172a;
            cursor: pointer;
            user-select: none;
            position: relative;
            transition: background-color 0.1s;
        }

        /* 3x3 Thicker borders */
        .sudoku-cell:nth-child(3n):not(:nth-child(9n)) { border-right: 2px solid #0f172a; }
        .sudoku-cell:nth-child(n+19):nth-child(-n+27),
        .sudoku-cell:nth-child(n+46):nth-child(-n+54) { border-bottom: 2px solid #0f172a; }
        .sudoku-cell:nth-child(n+73):nth-child(-n+81) { border-bottom: none; }

        /* --- Smart Highlighting Classes --- */
        .cell-selected { background-color: #bfdbfe !important; } /* Deepest blue for active */
        .cell-related { background-color: #eff6ff; } /* Light blue for row/col/box */
        .cell-same-number { background-color: #c7d2fe; } /* Purple-ish blue for matching numbers */
        .cell-error { 
            background-color: #fee2e2 !important; 
            color: #dc2626 !important; 
        }

        /* Text Colors */
        .text-fixed { color: #0f172a; font-weight: 700; }
        .text-user { color: #2563eb; font-weight: 500; }

        /* Notes Grid inside a cell */
        .notes-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            width: 100%;
            height: 100%;
            padding: 2px;
            pointer-events: none;
        }
        .note-num {
            font-size: 0.45rem;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #64748b;
            font-weight: 600;
        }

        /* Controls Area */
        .actions-container { margin-top: 25px; padding: 0 20px; }
        .action-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            transition: transform 0.1s;
        }
        .action-wrapper:active { transform: scale(0.95); }
        
        .action-icon {
            width: 48px; height: 48px;
            border-radius: 50%;
            background-color: #f8fafc;
            color: #2563eb;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.25rem;
            margin-bottom: 8px;
            position: relative;
        }
        
        .action-label { font-size: 0.65rem; font-weight: 700; color: #64748b; letter-spacing: 0.5px; }

        .notes-badge {
            position: absolute;
            top: -2px; right: -5px;
            font-size: 0.55rem;
            padding: 3px 6px;
            background-color: #0f172a !important;
            transition: 0.2s background-color;
        }
        .notes-badge.on { background-color: #2563eb !important; }

        /* Numpad */
        .numpad-container {
            padding: 0 15px;
            margin-top: 20px;
            display: flex;
            justify-content: space-between;
            gap: 4px;
        }
        .numpad-btn {
            flex: 1; aspect-ratio: 1 / 1.3;
            border: none;
            background-color: #f8fafc;
            color: #2563eb;
            font-size: 1.4rem; font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.1s;
        }
        .numpad-btn:active { background-color: #2563eb; color: #ffffff; }

        /* Footer */
        .footer-container { margin-top: auto; padding: 15px 20px 25px 20px; text-align: center; }
        .btn-new-game {
            background-color: #0f172a; color: white;
            border-radius: 50px; padding: 14px 40px;
            font-weight: 600; font-size: 0.9rem; letter-spacing: 1px;
            border: none; width: 85%; transition: 0.2s;
        }
        .btn-new-game:hover { background-color: #1e293b; }
        
        /* Modal Overlay */
        .win-overlay {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(255,255,255,0.95);
            display: none; flex-direction: column;
            justify-content: center; align-items: center; z-index: 100;
        }
        
        .loading-overlay {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: #ffffff;
            display: none; flex-direction: column;
            justify-content: center; align-items: center; z-index: 50;
        }
    </style>
</head>
<body>

<div class="app-container">
    
    <!-- START SCREEN -->
    <div id="startScreen">
        <div class="logo-container">
            <i class="bi bi-grid-3x3-gap-fill logo-icon"></i>
            <div class="app-title">SUDOKU</div>
            <p class="text-muted mt-2">Train your brain</p>
        </div>

        <button class="level-btn easy" onclick="startLevel('EASY')">Easy</button>
        <button class="level-btn medium" onclick="startLevel('MEDIUM')">Medium</button>
        <button class="level-btn hard" onclick="startLevel('HARD')">Hard</button>
        <button class="level-btn expert" onclick="startLevel('EXPERT')">Expert</button>
    </div>

    <!-- MAIN GAME SCREEN -->
    <div id="gameScreen">
        <!-- Top Header -->
        <div class="d-flex justify-content-between align-items-center px-4 py-4">
            <!-- Back Button to Menu -->
            <i class="bi bi-chevron-left fs-4" style="color: #475569; cursor: pointer;" onclick="showMainMenu()"></i>
            
            <div class="text-center">
                <div class="header-title fw-bold" id="difficultyLevel">MEDIUM</div>
                <div class="timer fw-bold" id="timerDisplay">00:00</div>
            </div>
            
            <i class="bi bi-gear fs-4" style="color: #475569; cursor: pointer;"></i>
        </div>

        <!-- Sudoku Board -->
        <div class="board-wrapper">
            <div class="sudoku-board" id="sudokuBoard"></div>
        </div>

        <!-- Actions -->
        <div class="actions-container d-flex justify-content-between">
            <div class="action-wrapper" id="btnUndo">
                <div class="action-icon"><i class="bi bi-arrow-return-left"></i></div>
                <div class="action-label">UNDO</div>
            </div>
            <div class="action-wrapper" id="btnErase">
                <div class="action-icon" style="color: #64748b;"><i class="bi bi-trash3"></i></div>
                <div class="action-label">ERASE</div>
            </div>
            <div class="action-wrapper" id="btnNotes">
                <div class="action-icon">
                    <span class="badge rounded-pill notes-badge" id="notesBadge">OFF</span>
                    <i class="bi bi-pencil"></i>
                </div>
                <div class="action-label">NOTES</div>
            </div>
            <div class="action-wrapper" id="btnHint">
                <div class="action-icon"><i class="bi bi-lightbulb"></i></div>
                <div class="action-label">HINT</div>
            </div>
        </div>

        <!-- Number Pad -->
        <div class="numpad-container" id="numpad"></div>

        <!-- Bottom Action -->
        <div class="footer-container">
            <button class="btn-new-game" onclick="showMainMenu()">NEW GAME</button>
        </div>
    </div>

    <!-- Win Overlay -->
    <div class="win-overlay" id="winOverlay">
        <i class="bi bi-trophy text-warning" style="font-size: 4rem; margin-bottom: 10px;"></i>
        <h2 class="text-dark fw-bold mb-2">Puzzle Solved!</h2>
        <p class="text-muted mb-4" id="winTime" style="font-size: 1.2rem; font-weight: 600;">Time: 00:00</p>
        <button class="btn btn-primary rounded-pill px-5 py-2" onclick="showMainMenu()">Play Again</button>
    </div>

    <!-- Loading Overlay for Board Generation -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="spinner-border text-primary" role="status"></div>
        <div class="mt-3 fw-bold text-muted">Generating puzzle...</div>
    </div>

</div>

<script>
    // --- Application State ---
    let fixedCells = []; 
    let currentGrid = []; 
    let notesGrid =[]; 
    let solutionGrid = []; 
    let moveHistory =[]; 

    let selectedIndex = -1;
    let notesMode = false;
    
    // Timer Variables
    let timerInterval;
    let secondsElapsed = 0;

    // DOM Elements
    const boardEl = document.getElementById('sudokuBoard');
    const numpadEl = document.getElementById('numpad');
    const timerDisplay = document.getElementById('timerDisplay');
    const notesBadge = document.getElementById('notesBadge');
    
    const startScreen = document.getElementById('startScreen');
    const gameScreen = document.getElementById('gameScreen');
    const winOverlay = document.getElementById('winOverlay');
    const difficultyLabel = document.getElementById('difficultyLevel');
    const loadingOverlay = document.getElementById('loadingOverlay');

    // --- Initialization ---
    function init() {
        createNumpad();
        setupEventListeners();
    }

    // --- Screen Navigation ---
    function showMainMenu() {
        stopTimer();
        gameScreen.style.display = 'none';
        winOverlay.style.display = 'none';
        startScreen.style.display = 'flex';
    }

    function startLevel(difficulty) {
        startScreen.style.display = 'none';
        loadingOverlay.style.display = 'flex';
        difficultyLabel.textContent = difficulty;

        // Use setTimeout to allow UI to show loading spinner before heavy math
        setTimeout(() => {
            generateNewPuzzle(difficulty);
            
            // Reset state
            notesGrid = Array.from({length: 81}, () => []);
            moveHistory =[];
            selectedIndex = -1;
            notesMode = false;
            updateNotesUI();
            
            // Reset and Start Timer
            startTimer();
            
            renderBoard();
            
            loadingOverlay.style.display = 'none';
            gameScreen.style.display = 'flex';
        }, 50);
    }

    // --- Sudoku Generator (Advanced Logic) ---
    function generateNewPuzzle(difficulty) {
        let emptyBoard = Array(81).fill(0);
        
        // 1. Fill diagonal 3x3 boxes first (they are independent, makes solving faster)
        fillDiagonalBoxes(emptyBoard);
        
        // 2. Solve the rest of the board completely with randomization
        solveSudokuRandomized(emptyBoard);
        
        // 3. Save the guaranteed solution
        solutionGrid = [...emptyBoard];
        currentGrid =[...emptyBoard];

        // 4. Remove elements based on difficulty
        let holesToCreate = 30; // Easy default
        if (difficulty === 'MEDIUM') holesToCreate = 43;
        if (difficulty === 'HARD') holesToCreate = 52;
        if (difficulty === 'EXPERT') holesToCreate = 60;

        let attempts = holesToCreate;
        while (attempts > 0) {
            let randomIndex = Math.floor(Math.random() * 81);
            if (currentGrid[randomIndex] !== 0) {
                currentGrid[randomIndex] = 0;
                attempts--;
            }
        }

        // Map read-only fixed cells based on what wasn't removed
        fixedCells = currentGrid.map(val => val !== 0);
    }

    function fillDiagonalBoxes(board) {
        for (let i = 0; i < 9; i += 3) {
            fillBox(board, i, i);
        }
    }

    function fillBox(board, rowStart, colStart) {
        let nums =[1, 2, 3, 4, 5, 6, 7, 8, 9];
        nums.sort(() => Math.random() - 0.5); // Shuffle array randomly
        let i = 0;
        for (let r = 0; r < 3; r++) {
            for (let c = 0; c < 3; c++) {
                board[(rowStart + r) * 9 + (colStart + c)] = nums[i++];
            }
        }
    }

    function solveSudokuRandomized(board) {
        for (let i = 0; i < 81; i++) {
            if (board[i] === 0) {
                let nums =[1, 2, 3, 4, 5, 6, 7, 8, 9].sort(() => Math.random() - 0.5);
                for (let num of nums) {
                    if (isValid(board, i, num)) {
                        board[i] = num;
                        if (solveSudokuRandomized(board)) return true;
                        board[i] = 0; // Backtrack
                    }
                }
                return false;
            }
        }
        return true;
    }

    function isValid(board, index, num) {
        const row = Math.floor(index / 9);
        const col = index % 9;
        const boxRow = Math.floor(row / 3) * 3;
        const boxCol = Math.floor(col / 3) * 3;

        for (let i = 0; i < 9; i++) {
            if (board[row * 9 + i] === num) return false;
            if (board[i * 9 + col] === num) return false;
            if (board[(boxRow + Math.floor(i / 3)) * 9 + (boxCol + i % 3)] === num) return false;
        }
        return true;
    }

    // --- Timer Logic ---
    function startTimer() {
        stopTimer();
        secondsElapsed = 0;
        formatAndShowTime();
        timerInterval = setInterval(() => {
            secondsElapsed++;
            formatAndShowTime();
        }, 1000);
    }

    function stopTimer() {
        if (timerInterval) clearInterval(timerInterval);
    }

    function formatAndShowTime() {
        const m = Math.floor(secondsElapsed / 60).toString().padStart(2, '0');
        const s = (secondsElapsed % 60).toString().padStart(2, '0');
        timerDisplay.textContent = `${m}:${s}`;
    }

    // --- Board Rendering ---
    function renderBoard() {
        boardEl.innerHTML = '';
        
        let errors = findErrors(); 
        let isComplete = true;

        for (let i = 0; i < 81; i++) {
            const cell = document.createElement('div');
            cell.className = 'sudoku-cell';
            cell.dataset.index = i;

            const val = currentGrid[i];
            if (val === 0) isComplete = false;

            // Handle Value vs Notes
            if (val !== 0) {
                cell.textContent = val;
                cell.classList.add(fixedCells[i] ? 'text-fixed' : 'text-user');
            } else if (notesGrid[i].length > 0) {
                const notesContainer = document.createElement('div');
                notesContainer.className = 'notes-grid';
                for(let n=1; n<=9; n++){
                    const noteSpan = document.createElement('div');
                    noteSpan.className = 'note-num';
                    if (notesGrid[i].includes(n)) noteSpan.textContent = n;
                    notesContainer.appendChild(noteSpan);
                }
                cell.appendChild(notesContainer);
            }

            // --- Smart Highlighting ---
            if (selectedIndex !== -1) {
                const selRow = Math.floor(selectedIndex / 9);
                const selCol = selectedIndex % 9;
                const selBox = Math.floor(selRow / 3) * 3 + Math.floor(selCol / 3);

                const iRow = Math.floor(i / 9);
                const iCol = i % 9;
                const iBox = Math.floor(iRow / 3) * 3 + Math.floor(iCol / 3);

                const selVal = currentGrid[selectedIndex];

                if (i === selectedIndex) {
                    cell.classList.add('cell-selected');
                } else if (selVal !== 0 && val === selVal) {
                    cell.classList.add('cell-same-number');
                } else if (iRow === selRow || iCol === selCol || iBox === selBox) {
                    cell.classList.add('cell-related');
                }
            }

            // Error Highlighting
            if (errors.includes(i)) {
                cell.classList.add('cell-error');
            }

            // Click Event
            cell.addEventListener('mousedown', () => {
                selectedIndex = i;
                renderBoard();
            });

            boardEl.appendChild(cell);
        }

        // Win Condition
        if (isComplete && errors.length === 0) triggerWin();
    }

    // Numpad Creation
    function createNumpad() {
        for (let i = 1; i <= 9; i++) {
            const btn = document.createElement('button');
            btn.className = 'numpad-btn';
            btn.textContent = i;
            btn.onclick = () => handleNumberInput(i);
            numpadEl.appendChild(btn);
        }
    }

    // --- Interaction Handling ---
    function handleNumberInput(num) {
        if (selectedIndex === -1 || fixedCells[selectedIndex]) return;

        saveHistory();

        if (notesMode) {
            if(currentGrid[selectedIndex] !== 0) return; 
            const notes = notesGrid[selectedIndex];
            if (notes.includes(num)) {
                notesGrid[selectedIndex] = notes.filter(n => n !== num);
            } else {
                notesGrid[selectedIndex].push(num);
            }
        } else {
            if (currentGrid[selectedIndex] === num) {
                currentGrid[selectedIndex] = 0; // Toggle off if same number
            } else {
                currentGrid[selectedIndex] = num;
                notesGrid[selectedIndex] =[]; // Clear notes
            }
        }
        renderBoard();
    }

    function saveHistory() {
        moveHistory.push({
            grid: [...currentGrid],
            notes: notesGrid.map(arr =>[...arr])
        });
    }

    function handleUndo() {
        if (moveHistory.length === 0) return;
        const lastState = moveHistory.pop();
        currentGrid = lastState.grid;
        notesGrid = lastState.notes;
        renderBoard();
    }

    function handleErase() {
        if (selectedIndex === -1 || fixedCells[selectedIndex]) return;
        saveHistory();
        currentGrid[selectedIndex] = 0;
        notesGrid[selectedIndex] =[];
        renderBoard();
    }

    function handleHint() {
        if (selectedIndex === -1 || fixedCells[selectedIndex] || currentGrid[selectedIndex] !== 0) return;
        saveHistory();
        currentGrid[selectedIndex] = solutionGrid[selectedIndex];
        notesGrid[selectedIndex] =[];
        renderBoard();
    }

    function toggleNotes() {
        notesMode = !notesMode;
        updateNotesUI();
    }

    function updateNotesUI() {
        notesBadge.textContent = notesMode ? 'ON' : 'OFF';
        if(notesMode) {
            notesBadge.classList.add('on');
            document.getElementById('btnNotes').querySelector('.action-icon').style.backgroundColor = '#dbeafe';
        } else {
            notesBadge.classList.remove('on');
            document.getElementById('btnNotes').querySelector('.action-icon').style.backgroundColor = '#f8fafc';
        }
    }

    // --- Validation Utilities ---
    function findErrors() {
        const errors = new Set();
        for (let i = 0; i < 81; i++) {
            const val = currentGrid[i];
            if (val === 0) continue;

            const row = Math.floor(i / 9);
            const col = i % 9;
            const boxRow = Math.floor(row / 3) * 3;
            const boxCol = Math.floor(col / 3) * 3;

            for (let j = 0; j < 81; j++) {
                if (i === j) continue;
                
                const jRow = Math.floor(j / 9);
                const jCol = j % 9;
                
                const isSameRow = row === jRow;
                const isSameCol = col === jCol;
                const isSameBox = (jRow >= boxRow && jRow < boxRow + 3) && (jCol >= boxCol && jCol < boxCol + 3);

                if ((isSameRow || isSameCol || isSameBox) && currentGrid[j] === val) {
                    errors.add(i);
                    errors.add(j);
                }
            }
        }
        return Array.from(errors);
    }

    function triggerWin() {
        stopTimer();
        document.getElementById('winTime').textContent = `Time: ${timerDisplay.textContent}`;
        winOverlay.style.display = 'flex';
    }

    // --- Keyboard & Button Setup ---
    function setupEventListeners() {
        document.getElementById('btnUndo').addEventListener('click', handleUndo);
        document.getElementById('btnErase').addEventListener('click', handleErase);
        document.getElementById('btnNotes').addEventListener('click', toggleNotes);
        document.getElementById('btnHint').addEventListener('click', handleHint);

        // Global Keyboard Input
        document.addEventListener('keydown', (e) => {
            if (gameScreen.style.display === 'none') return; // Ignore if in menu

            if (e.key >= '1' && e.key <= '9') {
                handleNumberInput(parseInt(e.key));
            } else if (e.key === 'Backspace' || e.key === 'Delete') {
                handleErase();
            } else if (e.key.toLowerCase() === 'n') {
                toggleNotes();
            } else if (selectedIndex !== -1) {
                // Arrow key navigation
                let row = Math.floor(selectedIndex / 9);
                let col = selectedIndex % 9;
                
                if (e.key === 'ArrowUp') row = Math.max(0, row - 1);
                else if (e.key === 'ArrowDown') row = Math.min(8, row + 1);
                else if (e.key === 'ArrowLeft') col = Math.max(0, col - 1);
                else if (e.key === 'ArrowRight') col = Math.min(8, col + 1);
                
                if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.key)) {
                    selectedIndex = row * 9 + col;
                    renderBoard();
                    e.preventDefault(); 
                }
            }
        });
    }

    // Start App
    init();

</script>

</body>
</html>
