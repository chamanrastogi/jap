<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Endless Cube Runner</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            margin: 0;
            overflow: hidden; /* Hide scrollbars */
            background-color: #87CEEB; /* Fallback Sky Blue */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        #game-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }
        /* UI Overlay */
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none; /* Let clicks pass through to canvas if needed */
            z-index: 5;
        }
        .score-text {
            font-size: 2rem;
            font-weight: bold;
            color: white;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
        }
        /* Main Menu / Game Over Screen */
        #menu-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(5px);
            z-index: 10;
        }
    </style>
</head>
<body>

    <!-- Three.js Canvas Container -->
    <div id="game-canvas"></div>

    <!-- In-Game UI -->
    <div id="ui-layer" class="p-4 d-none">
        <div class="score-text">Score: <span id="scoreVal">0</span></div>
    </div>

    <!-- Main Menu / Game Over Overlay -->
    <div id="menu-layer" class="d-flex justify-content-center align-items-center">
        <div class="card text-center p-5 shadow-lg border-0 rounded-4" style="max-width: 400px; background: rgba(255, 255, 255, 0.95);">
            <div class="card-body">
                <h1 id="menu-title" class="card-title fw-bold text-primary mb-3">CUBE RUNNER</h1>
                <p id="menu-desc" class="text-muted mb-4">
                    Use <b>Left/Right Arrows</b> or <b>A/D</b> to move.<br>
                    Press <b>Spacebar</b> to jump.<br>
                    Dodge the red obstacles!
                </p>
                <h3 id="final-score" class="text-danger fw-bold d-none mb-4">Final Score: 0</h3>
                <button id="start-btn" class="btn btn-primary btn-lg rounded-pill px-5 fw-bold shadow">START GAME</button>
            </div>
        </div>
    </div>

    <!-- Three.js Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <!-- Game Logic -->
    <script>
        // --- 1. Basic Setup ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB); // Sky blue background
        scene.fog = new THREE.Fog(0x87CEEB, 20, 100); // Add fog for depth illusion

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 4, 8); // Position camera behind and slightly above the player
        camera.lookAt(0, 0, -10);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true; // Enable shadows
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.getElementById('game-canvas').appendChild(renderer.domElement);

        // --- 2. Lighting ---
        const ambientLight = new THREE.HemisphereLight(0xffffff, 0x444444, 0.6);
        scene.add(ambientLight);

        const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
        directionalLight.position.set(10, 20, 10);
        directionalLight.castShadow = true;
        directionalLight.shadow.camera.top = 20;
        directionalLight.shadow.camera.bottom = -20;
        directionalLight.shadow.camera.left = -20;
        directionalLight.shadow.camera.right = 20;
        scene.add(directionalLight);

        // --- 3. Environment (Road/Ground) ---
        // A long platform representing the road
        const roadGeometry = new THREE.PlaneGeometry(12, 200);
        const roadMaterial = new THREE.MeshStandardMaterial({ color: 0x555555, roughness: 0.8 });
        const road = new THREE.Mesh(roadGeometry, roadMaterial);
        road.rotation.x = -Math.PI / 2;
        road.position.z = -50;
        road.receiveShadow = true;
        scene.add(road);

        // Grid helper to simulate movement visually
        const gridHelper = new THREE.GridHelper(12, 100, 0xffffff, 0xffffff);
        gridHelper.position.set(0, 0.01, -50);
        gridHelper.material.opacity = 0.2;
        gridHelper.material.transparent = true;
        scene.add(gridHelper);

        // --- 4. Player Object ---
        const playerGeometry = new THREE.BoxGeometry(1, 1, 1);
        const playerMaterial = new THREE.MeshStandardMaterial({ color: 0x0d6efd, roughness: 0.5 }); // Bootstrap primary blue
        const player = new THREE.Mesh(playerGeometry, playerMaterial);
        player.castShadow = true;
        player.receiveShadow = true;
        scene.add(player);

        // --- 5. Game State & Variables ---
        let isGameOver = true;
        let score = 0;
        let gameSpeed = 15;
        let baseSpeed = 15;
        const clock = new THREE.Clock();

        // Player physics limits
        const laneWidth = 4; // Max distance left/right
        let velocityY = 0;
        let isJumping = false;
        const gravity = 50;
        const jumpForce = 18;
        const lateralSpeed = 10;

        // Obstacles array and generation timers
        let obstacles =[];
        let obstacleSpawnTimer = 0;
        let obstacleSpawnInterval = 1.0; // Seconds between spawns

        // Controls state
        const keys = { left: false, right: false, space: false };

        // DOM Elements
        const uiLayer = document.getElementById('ui-layer');
        const menuLayer = document.getElementById('menu-layer');
        const scoreVal = document.getElementById('scoreVal');
        const finalScoreLabel = document.getElementById('final-score');
        const startBtn = document.getElementById('start-btn');
        const menuTitle = document.getElementById('menu-title');

        // Bounding Box for Player Collision
        const playerBox = new THREE.Box3();
        const obstacleBox = new THREE.Box3();

        // --- 6. Input Listeners ---
        window.addEventListener('keydown', (e) => {
            if (e.code === 'ArrowLeft' || e.code === 'KeyA') keys.left = true;
            if (e.code === 'ArrowRight' || e.code === 'KeyD') keys.right = true;
            if (e.code === 'Space') {
                keys.space = true;
                if (!isJumping && !isGameOver) {
                    velocityY = jumpForce;
                    isJumping = true;
                }
            }
        });

        window.addEventListener('keyup', (e) => {
            if (e.code === 'ArrowLeft' || e.code === 'KeyA') keys.left = false;
            if (e.code === 'ArrowRight' || e.code === 'KeyD') keys.right = false;
            if (e.code === 'Space') keys.space = false;
        });

        // Handle Window Resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- 7. Core Functions ---

        function startGame() {
            // Reset Stats
            isGameOver = false;
            score = 0;
            gameSpeed = baseSpeed;
            scoreVal.innerText = '0';
            obstacleSpawnTimer = 0;

            // Reset Player
            player.position.set(0, 0.5, 0);
            player.rotation.set(0, 0, 0);
            velocityY = 0;
            isJumping = false;

            // Clean up old obstacles
            obstacles.forEach(obs => {
                scene.remove(obs);
                obs.geometry.dispose();
                obs.material.dispose();
            });
            obstacles =[];

            // UI switches
            menuLayer.classList.replace('d-flex', 'd-none');
            uiLayer.classList.remove('d-none');
            clock.start();
        }

        function spawnObstacle() {
            // Randomize obstacle type (Cube or wide barrier)
            const isWide = Math.random() > 0.8;
            const width = isWide ? 3 : 1;
            const height = isWide ? 1 : (1 + Math.random() * 1.5);
            
            const obsGeo = new THREE.BoxGeometry(width, height, 1);
            const obsMat = new THREE.MeshStandardMaterial({ color: 0xdc3545 }); // Bootstrap Danger Red
            const obs = new THREE.Mesh(obsGeo, obsMat);
            
            obs.castShadow = true;
            obs.receiveShadow = true;
            
            // Random X position within lanes
            const randomX = (Math.random() * (laneWidth * 2)) - laneWidth;
            obs.position.set(randomX, height / 2, -80);
            
            scene.add(obs);
            obstacles.push(obs);
        }

        function gameOver() {
            isGameOver = true;
            
            // Update UI
            uiLayer.classList.add('d-none');
            menuLayer.classList.replace('d-none', 'd-flex');
            
            menuTitle.innerText = "GAME OVER";
            finalScoreLabel.innerText = `Final Score: ${Math.floor(score)}`;
            finalScoreLabel.classList.remove('d-none');
            startBtn.innerText = "PLAY AGAIN";
        }

        startBtn.addEventListener('click', startGame);

        // --- 8. Main Game Loop ---
        function animate() {
            requestAnimationFrame(animate);

            const delta = clock.getDelta();

            if (!isGameOver) {
                // 1. Update Player Movement (Lateral)
                if (keys.left) player.position.x -= lateralSpeed * delta;
                if (keys.right) player.position.x += lateralSpeed * delta;

                // Clamp player to road edges
                if (player.position.x < -laneWidth) player.position.x = -laneWidth;
                if (player.position.x > laneWidth) player.position.x = laneWidth;

                // 2. Update Player Jump (Vertical Physics)
                player.position.y += velocityY * delta;
                velocityY -= gravity * delta;

                // Floor collision (Cube center is at 0.5 when resting on 0)
                if (player.position.y <= 0.5) {
                    player.position.y = 0.5;
                    velocityY = 0;
                    isJumping = false;
                }

                // Make player cube rotate forward to simulate running
                if(!isJumping) {
                    player.rotation.x -= gameSpeed * delta * 0.5;
                } else {
                    player.rotation.x -= gameSpeed * delta * 1.0; // Rotate faster in air
                }

                // 3. Move Grid Texture to simulate forward movement
                gridHelper.position.z += gameSpeed * delta;
                if (gridHelper.position.z > -40) {
                    gridHelper.position.z -= 10; // Loop the grid
                }

                // 4. Update Score & Difficulty Speed
                score += gameSpeed * delta;
                scoreVal.innerText = Math.floor(score);
                
                // Gradually increase speed over time
                gameSpeed += delta * 0.2;

                // 5. Spawn Obstacles
                obstacleSpawnTimer += delta;
                // As we go faster, spawn obstacles slightly faster, but cap it
                let currentSpawnInterval = Math.max(0.4, obstacleSpawnInterval - (gameSpeed - baseSpeed) * 0.02);
                
                if (obstacleSpawnTimer >= currentSpawnInterval) {
                    spawnObstacle();
                    obstacleSpawnTimer = 0;
                }

                // 6. Update Obstacles & Check Collisions
                playerBox.setFromObject(player); // Update player bounding box

                for (let i = 0; i < obstacles.length; i++) {
                    const obs = obstacles[i];
                    
                    // Move obstacle towards player
                    obs.position.z += gameSpeed * delta;

                    // Update obstacle bounding box
                    obstacleBox.setFromObject(obs);

                    // Check Intersection / Collision
                    // Shrink player box slightly for more forgiving/fair gameplay
                    playerBox.expandByScalar(-0.1); 

                    if (playerBox.intersectsBox(obstacleBox)) {
                        gameOver();
                        break; // Stop checking collisions this frame
                    }

                    // Remove obstacles that have passed the camera
                    if (obs.position.z > 10) {
                        scene.remove(obs);
                        obs.geometry.dispose();
                        obs.material.dispose();
                        obstacles.splice(i, 1);
                        i--; // Adjust index after splice
                    }
                }
            }

            // Render the scene
            renderer.render(scene, camera);
        }

        // Start animation loop
        animate();
    </script>
</body>
</html>
